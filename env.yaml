name: jetson_env
version: 1.0
description: Environment for Jetson and Raspberry Pi GPIO control with OpenCV
author: AA
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - numpy
  - pip
  - setuptools
  - wheel
  - pip:
    - opencv-python==4.5.4.60
    - jetson-gpio==2.1.9
    - rpi-gpio==0.7.1